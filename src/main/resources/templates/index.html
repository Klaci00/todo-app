<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo App</title>
</head>
<body>
    <h1>Todo App</h1>

    <form th:action="@{/add}" method="post">
        <input type="text" name="title" placeholder="New task..." required />
        <input type="date" name="dueDate" required />
        <button type="submit">Add</button>
    </form>

<table border="1">
    <thead>
        <tr>
            <th>Task</th>
            <th>Added</th>
            <th>Due Date</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="todo : ${todos}">
            <td>
                <span th:text="${todo.title}"
                      th:style="${todo.completed} ? 'text-decoration:line-through' : ''">
                </span>
            </td>
            <td th:text="${#temporals.format(todo.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
            <td th:text="${#temporals.format(todo.dueDate, 'yyyy-MM-dd')}"></td>
            <td>
                <form th:action="@{/toggle/{id}(id=${todo.id})}" method="post" style="display:inline">
                    <button type="submit" th:text="${todo.completed} ? 'Undo' : 'Done'"></button>
                </form>
                <form th:action="@{/delete/{id}(id=${todo.id})}" method="post" style="display:inline">
                    <button type="submit">Delete</button>
                </form>
            </td>
        </tr>
    </tbody>
</table>
</body>
</html>
